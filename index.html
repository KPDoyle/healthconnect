<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#071e2f"><meta name="description" content="HealthConnect personal health data hub prototype">
<title>HealthConnect — Your complete health picture</title>
<style>
:root{--navy:#071e2f;--navy2:#0b2b44;--ink:#152633;--muted:#71808b;--line:#dfe8ed;--bg:#f4f8fa;--white:#fff;--mint:#38c7a1;--mint2:#e7f8f3;--blue:#4d8df7;--amber:#f4aa47;--shadow:0 14px 40px rgba(7,30,47,.08)}*{box-sizing:border-box}body{margin:0;font-family:Inter,ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--ink)}button,input,select{font:inherit}button{cursor:pointer}.app{min-height:100vh;display:grid;grid-template-columns:250px 1fr}.side{background:var(--navy);color:#dce9ef;padding:24px 16px;position:sticky;top:0;height:100vh}.brand{display:flex;gap:12px;align-items:center;padding:0 10px 28px}.logo{width:42px;height:42px;border-radius:14px;background:linear-gradient(135deg,var(--mint),#74e0c3);display:grid;place-items:center;color:var(--navy);font-weight:900;font-size:21px}.brand strong{display:block;color:white;font-size:19px}.brand span{font-size:12px;color:#8fa9b8}.label{padding:12px 12px 8px;color:#7893a3;text-transform:uppercase;font-size:10px;letter-spacing:.12em}.nav button{width:100%;border:0;background:transparent;color:#adc0ca;text-align:left;padding:11px 12px;border-radius:10px;margin:2px 0;display:flex;gap:10px;align-items:center}.nav button.active,.nav button:hover{background:#113a57;color:white}.privacy{position:absolute;left:16px;right:16px;bottom:20px;border:1px solid #1d4964;background:#0d3049;border-radius:14px;padding:14px;font-size:12px;line-height:1.5;color:#a9bfca}.main{min-width:0}.top{height:70px;background:white;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 30px;position:sticky;top:0;z-index:4}.search{display:flex;align-items:center;gap:8px;background:#f2f6f8;border:1px solid #e5ecef;border-radius:10px;padding:9px 12px;width:min(440px,55vw)}.search input{border:0;background:transparent;outline:0;width:100%}.avatar{width:36px;height:36px;border-radius:50%;background:var(--navy2);color:white;display:grid;place-items:center;font-size:12px;font-weight:700}.content{padding:32px;max-width:1500px;margin:auto}.head{display:flex;justify-content:space-between;gap:20px;align-items:end;margin-bottom:26px}.eyebrow{color:#2aa381;text-transform:uppercase;font-size:11px;letter-spacing:.14em;font-weight:800}.head h1{margin:7px 0 6px;font-size:34px;line-height:1.1}.head p{margin:0;color:var(--muted);max-width:720px}.actions{display:flex;gap:9px;flex-wrap:wrap}.btn{border:1px solid var(--line);background:white;color:var(--ink);border-radius:10px;padding:10px 14px;font-weight:700;box-shadow:0 2px 8px rgba(7,30,47,.03)}.btn.primary{background:var(--navy2);color:white;border-color:var(--navy2)}.grid{display:grid;gap:18px}.four{grid-template-columns:repeat(4,1fr)}.two{grid-template-columns:1.4fr 1fr}.three{grid-template-columns:repeat(3,1fr)}.panel{background:white;border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow)}.pad{padding:20px}.metric{padding:18px}.metric .toprow{display:flex;justify-content:space-between}.dot{width:36px;height:36px;border-radius:12px;background:var(--mint2);display:grid;place-items:center}.badge{font-size:11px;padding:5px 8px;border-radius:99px;background:#edf8f4;color:#218269}.metric label{display:block;color:var(--muted);font-size:13px;margin:17px 0 5px}.metric strong{font-size:28px}.metric small{color:var(--muted);margin-left:5px}.trend{font-size:12px;color:#2a9f7e;margin-top:7px}.spark{height:34px;margin-top:9px;background:linear-gradient(180deg,transparent,#f4fbf8);position:relative;overflow:hidden;border-radius:7px}.spark:after{content:"";position:absolute;left:0;right:0;bottom:10px;height:2px;background:linear-gradient(90deg,transparent,var(--mint),var(--blue),var(--mint));transform:skewY(-5deg)}.panel h2{margin:0;font-size:17px}.kicker{margin:5px 0 18px;color:var(--muted);font-size:13px}.score{display:flex;gap:22px;align-items:center}.ring{width:126px;height:126px;border-radius:50%;background:conic-gradient(var(--mint) 0 79%,#e9f0f3 79%);display:grid;place-items:center;position:relative}.ring:before{content:"";width:94px;height:94px;background:white;border-radius:50%;position:absolute}.ring b{font-size:31px;z-index:1}.ring span{font-size:11px;color:var(--muted);z-index:1;position:absolute;margin-top:42px}.scorecopy p{color:var(--muted);line-height:1.55;margin:8px 0}.source{display:inline-flex;padding:5px 8px;background:#f0f5f7;border-radius:7px;color:#567;font-size:11px;margin-top:4px}.insight{border-left:3px solid var(--blue);padding:3px 0 3px 14px;margin:16px 0}.insight strong{display:block;font-size:14px}.insight p{margin:5px 0;color:var(--muted);font-size:13px;line-height:1.5}.timeline .row,.record,.connection,.med{display:grid;grid-template-columns:42px 1fr auto;gap:12px;align-items:center;padding:14px 0;border-top:1px solid #edf1f3}.timeline .row:first-child,.record:first-child,.connection:first-child,.med:first-child{border-top:0}.ico{width:38px;height:38px;border-radius:12px;background:#edf6fa;display:grid;place-items:center}.copy strong{display:block;font-size:14px}.copy span,.date{color:var(--muted);font-size:12px}.status{border:0;border-radius:99px;padding:7px 10px;background:#eef3f5;color:#526773;font-size:11px}.status.on{background:var(--mint2);color:#1d8165}.table{overflow:auto}.tablehead,.record{min-width:620px;grid-template-columns:2fr 1fr 1.2fr .8fr}.tablehead{display:grid;padding:9px 0;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.05em}.med{grid-template-columns:42px 1.5fr 1fr 1fr auto}.empty{text-align:center;padding:34px;color:var(--muted)}.vault{padding:20px;background:linear-gradient(135deg,#0a2b43,#105070);color:white;border-radius:16px}.vault p{color:#c0d2dc;line-height:1.55}.toggle{display:flex;justify-content:space-between;gap:15px;padding:15px 0;border-top:1px solid #edf1f3}.switch{width:44px;height:24px;border-radius:20px;background:#dbe4e8;padding:3px}.switch:after{content:"";display:block;width:18px;height:18px;background:white;border-radius:50%;box-shadow:0 1px 3px #789}.switch.on{background:var(--mint)}.switch.on:after{margin-left:20px}.hidden{display:none!important}.modalback{position:fixed;inset:0;background:rgba(2,18,29,.65);z-index:20;display:grid;place-items:center;padding:18px}.modal{background:white;width:min(560px,100%);border-radius:18px;padding:22px;box-shadow:0 25px 80px rgba(0,0,0,.3)}.modal h2{margin-top:0}.field{display:grid;gap:6px;margin:12px 0}.field label{font-size:12px;color:var(--muted)}.field input,.field select{border:1px solid var(--line);padding:11px;border-radius:9px}.notice{font-size:12px;color:#667984;background:#f2f6f8;border-radius:10px;padding:12px;line-height:1.5}.toast{position:fixed;right:22px;bottom:22px;background:var(--navy);color:white;padding:13px 17px;border-radius:10px;z-index:30;box-shadow:var(--shadow)}.mobile{display:none}.disclaimer{margin-top:25px;color:#84929b;font-size:11px;line-height:1.5}@media(max-width:1050px){.four{grid-template-columns:repeat(2,1fr)}.two{grid-template-columns:1fr}.three{grid-template-columns:1fr 1fr}}@media(max-width:760px){.app{display:block}.side{position:fixed;z-index:10;transform:translateX(-100%);transition:.2s;width:250px}.side.open{transform:none}.mobile{display:block;border:0;background:transparent;font-size:22px}.top{padding:0 16px}.content{padding:22px 15px}.head{align-items:start;flex-direction:column}.head h1{font-size:28px}.four,.three{grid-template-columns:1fr}.search{width:65vw}.score{align-items:flex-start}.med{grid-template-columns:42px 1fr auto}.med>*:nth-child(3),.med>*:nth-child(4){display:none}}
</style>
</head>
<body><div id="app"></div>
<script>
const seed={records:[['Full blood count','Laboratory','University Hospital','18 Jul 2026'],['Dental panoramic X-ray','Imaging','Hampshire Dental','14 Jul 2026'],['Annual GP health review','Clinical note','NHS GP record','02 Jul 2026'],['Lipid profile','Laboratory','NHS Pathology','20 Jun 2026']],meds:[['Atorvastatin','20 mg','Once daily','20:00'],['Vitamin D3','1,000 IU','Once daily','Tomorrow'],['Aspirin','75 mg','Once daily','20:00']],connections:['apple','documents']};
let S={view:'overview',records:JSON.parse(localStorage.getItem('hc-records')||JSON.stringify(seed.records)),meds:JSON.parse(localStorage.getItem('hc-meds')||JSON.stringify(seed.meds)),connections:JSON.parse(localStorage.getItem('hc-connections')||JSON.stringify(seed.connections)),modal:null};
const nav=[['overview','⌂','Overview'],['timeline','◷','Health timeline'],['records','▤','Clinical records'],['medications','✚','Medications'],['connections','⌁','Data connections'],['privacy','▣','Privacy & sharing']];
const esc=s=>String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function save(){localStorage.setItem('hc-records',JSON.stringify(S.records));localStorage.setItem('hc-meds',JSON.stringify(S.meds));localStorage.setItem('hc-connections',JSON.stringify(S.connections))}
function heading(e,t,p,a=''){return `<div class="head"><div><div class="eyebrow">${e}</div><h1>${t}</h1><p>${p}</p></div><div class="actions">${a}</div></div>`}
const btn=(t,a,p=false)=>`<button class="btn ${p?'primary':''}" data-action="${a}">${t}</button>`;
function metric(l,v,u,tr,i){return `<div class="panel metric"><div class="toprow"><div class="dot">${i}</div><span class="status on">Stable</span></div><label>${l}</label><strong>${v}</strong><small>${u}</small><div class="trend">${tr}</div><div class="spark"></div></div>`}
function overview(){return heading('Personal health intelligence','Your complete health picture','One private place for clinical records, wearable data, medications and documents.',btn('Share summary','share')+btn('Import data','import',true))+`<div class="grid four">${metric('Resting heart rate','62','bpm','↓ 3 from last month','♥')}${metric('Sleep','7h 18','average','↑ 24 minutes','☾')}${metric('Blood pressure','124/78','mmHg','Within your range','⌁')}${metric('Daily movement','7,842','steps','↑ 8% this week','↗')}</div><div style="height:18px"></div><div class="grid two"><section class="panel pad"><h2>Health index</h2><p class="kicker">A transparent summary of available data — not a diagnosis.</p><div class="score"><div class="ring"><b>79</b><span>of 100</span></div><div class="scorecopy"><strong>Overall trend is stable</strong><p>Sleep consistency and activity are improving. Some clinical data is older than twelve months.</p><span class="source">Calculated from 4 connected sources</span></div></div></section><section class="panel pad"><h2>HealthConnect observations</h2><p class="kicker">AI-generated observations are labelled and traceable.</p><div class="insight"><strong>Sleep and resting heart rate are moving together</strong><p>On longer-sleep nights, resting heart rate was lower the following morning.</p><span class="source">AI observation · Apple Health data</span></div><div class="insight"><strong>Record completeness: 72%</strong><p>Dental and vaccination history could improve the longitudinal record.</p><span class="source">System observation</span></div></section></div><div style="height:18px"></div><div class="grid two"><section class="panel pad"><h2>Recent health activity</h2><p class="kicker">Measured, clinical and uploaded information remains source-labelled.</p><div class="timeline">${S.records.slice(0,4).map((r,i)=>`<div class="row"><div class="ico">${i%2?'▤':'♥'}</div><div class="copy"><strong>${esc(r[0])}</strong><span>${esc(r[2])} · ${esc(r[1])}</span></div><div class="date">${r[3]}</div></div>`).join('')}</div></section><section class="panel pad"><h2>Your data sources</h2><p class="kicker">Connections require explicit user consent.</p>${connectionRows(3)}</section></div><p class="disclaimer">HealthConnect is a product prototype. It does not diagnose, provide medical advice or replace a clinician. Demonstration metrics are illustrative.</p>`}
function timeline(){return heading('Longitudinal record','Health timeline','A chronological view combining clinical, wearable and personal information.',btn('Add record','record',true))+`<section class="panel pad timeline">${S.records.map((r,i)=>`<div class="row"><div class="ico">${i%2?'▤':'♥'}</div><div class="copy"><strong>${esc(r[0])}</strong><span>${esc(r[2])} · ${esc(r[1])}</span></div><div class="date">${r[3]}</div></div>`).join('')}</section>`}
function records(){return heading('Clinical information','Clinical records','Reports, test results, imaging and consultations in one searchable library.',btn('Add record','record')+btn('Import document','import',true))+`<section class="panel pad table"><div class="tablehead"><span>Record</span><span>Category</span><span>Provider</span><span>Date</span></div>${S.records.map(r=>`<div class="record"><div class="copy"><strong>${esc(r[0])}</strong><span>Source verified in prototype</span></div><span>${esc(r[1])}</span><span>${esc(r[2])}</span><span>${r[3]}</span></div>`).join('')}</section>`}
function medications(){return heading('Treatment record','Medications','Keep an accurate, portable list for everyday and emergency care.',btn('Add medication','med',true))+`<section class="panel pad">${S.meds.map(m=>`<div class="med"><div class="ico">✚</div><div class="copy"><strong>${esc(m[0])}</strong><span>${esc(m[1])}</span></div><span>${esc(m[2])}</span><span>Next: ${esc(m[3])}</span><button class="status on">Active</button></div>`).join('')}</section>`}
const sources=[['apple','A','Apple Health','Activity, heart, sleep and mobility'],['nhs','N','NHS records','GP records, prescriptions and test results'],['wearables','W','Wearables','Garmin, Fitbit, Oura and other devices'],['labs','L','Laboratories','Private and NHS diagnostic results'],['documents','D','Documents','PDF, image, FHIR and structured imports']];
function connectionRows(n=99){return sources.slice(0,n).map(x=>`<div class="connection"><div class="ico">${x[1]}</div><div class="copy"><strong>${x[2]}</strong><span>${x[3]}</span></div><button class="status ${S.connections.includes(x[0])?'on':''}" data-connect="${x[0]}">${S.connections.includes(x[0])?'Connected':'Connect'}</button></div>`).join('')}
function connections(){return heading('Interoperability','Data connections','Connect records and devices while keeping consent visible and reversible.',btn('Import file','import',true))+`<div class="grid two"><section class="panel pad"><h2>Available sources</h2><p class="kicker">Production integrations require provider approval and secure authentication.</p>${connectionRows()}</section><section class="panel pad"><div class="vault"><h2>Designed around open standards</h2><p>FHIR-compatible clinical exchange, Apple HealthKit, Android Health Connect and user-controlled document imports form the intended integration layer.</p></div><div class="insight"><strong>Every item keeps its provenance</strong><p>HealthConnect distinguishes device measurements, clinician-authored records, user-entered information and AI-generated interpretations.</p></div><div class="notice">Connections shown here are prototypes and do not access live accounts.</div></section></div>`}
function privacy(){return heading('User-controlled data','Privacy & sharing','Understand where information came from, who can access it and how to export it.',btn('Export my data','export'))+`<div class="grid two"><section class="panel pad"><div class="vault"><h2>Personal health vault</h2><p>This demonstration stores additions only in this browser. A production service should use strong authentication, encryption, audit logs and separate consent for each data use.</p></div>${[['Enhanced protection','Device encryption and biometric unlock where available'],['Access history','Log each view, import, export and share'],['Research contribution','Off by default; requires separate explicit consent'],['Emergency summary','Share only the minimum information selected by you']].map((x,i)=>`<div class="toggle"><div class="copy"><strong>${x[0]}</strong><span>${x[1]}</span></div><div class="switch ${i!==2?'on':''}"></div></div>`).join('')}</section><section class="panel pad"><h2>Active access</h2><p class="kicker">No external person currently has access.</p><div class="empty"><div class="ico" style="margin:auto">▣</div><h3>Your record is private</h3><p>Create a revocable, time-limited summary only when needed.</p>${btn('Create secure access','share',true)}</div><div class="notice">Before live health data is processed, the product requires a UK GDPR DPIA, defined controller/processor roles and formal security assurance.</div></section></div>`}
function modal(){if(!S.modal)return'';let body='';if(S.modal==='record')body=`<h2>Add a clinical record</h2><form id="recordForm"><div class="field"><label>Record name</label><input name="name" required></div><div class="field"><label>Category</label><select name="cat"><option>Clinical note</option><option>Laboratory</option><option>Imaging</option><option>Procedure</option></select></div><div class="field"><label>Provider</label><input name="provider"></div><button class="btn primary">Add record</button></form>`;else if(S.modal==='med')body=`<h2>Add medication</h2><form id="medForm"><div class="field"><label>Name</label><input name="name" required></div><div class="field"><label>Dose</label><input name="dose" required></div><div class="field"><label>Schedule</label><input name="schedule" value="Once daily"></div><button class="btn primary">Add medication</button></form>`;else if(S.modal==='import')body=`<h2>Import health data</h2><p class="notice">Choose a PDF, image, JSON, XML or CSV file. This prototype records the file name only and does not upload it.</p><div class="field"><input id="file" type="file"></div><button class="btn primary" id="choose">Add selected file</button>`;else body=`<h2>Share a health summary</h2><div class="field"><label>Share with</label><input placeholder="Clinician or trusted contact"></div><div class="field"><label>Access duration</label><select><option>24 hours</option><option>7 days</option><option>30 days</option></select></div><p class="notice">Preview only. No data is transmitted.</p><button class="btn primary" data-action="createShare">Create preview link</button>`;return `<div class="modalback" data-action="close"><div class="modal" onclick="event.stopPropagation()">${body}<button class="btn" style="margin-top:12px" data-action="close">Close</button></div></div>`}
function render(){const views={overview,timeline,records,medications,connections,privacy};document.getElementById('app').innerHTML=`<div class="app"><aside class="side" id="side"><div class="brand"><div class="logo">♥</div><div><strong>HealthConnect</strong><span>Personal health vault</span></div></div><div class="label">Your health</div><nav class="nav">${nav.map(n=>`<button data-view="${n[0]}" class="${S.view===n[0]?'active':''}"><span>${n[1]}</span>${n[2]}</button>`).join('')}</nav><div class="privacy"><strong>▣ Private by design</strong><br>Your prototype information remains on this device.</div></aside><main class="main"><header class="top"><button class="mobile" data-action="menu">☰</button><label class="search">⌕ <input placeholder="Search your health record"></label><div class="avatar">KD</div></header><div class="content">${views[S.view]()}</div></main>${modal()}</div>`;bind()}
function toast(t){let x=document.createElement('div');x.className='toast';x.textContent=t;document.body.appendChild(x);setTimeout(()=>x.remove(),2400)}
function exportData(){let blob=new Blob([JSON.stringify({exportedAt:new Date().toISOString(),records:S.records,medications:S.meds,connections:S.connections},null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='healthconnect-export.json';a.click();toast('Local export prepared')}
function bind(){document.querySelectorAll('[data-view]').forEach(b=>b.onclick=()=>{S.view=b.dataset.view;render()});document.querySelectorAll('[data-connect]').forEach(b=>b.onclick=()=>{let id=b.dataset.connect;S.connections=S.connections.includes(id)?S.connections.filter(x=>x!==id):[...S.connections,id];save();render();toast('Connection preference updated')});document.querySelectorAll('[data-action]').forEach(b=>b.onclick=()=>{let a=b.dataset.action;if(['record','med','import','share'].includes(a)){S.modal=a;render()}else if(a==='close'){S.modal=null;render()}else if(a==='export')exportData();else if(a==='menu')document.getElementById('side').classList.toggle('open');else if(a==='createShare'){S.modal=null;render();toast('Secure link created in preview mode')}});let rf=document.getElementById('recordForm');if(rf)rf.onsubmit=e=>{e.preventDefault();let d=new FormData(rf);S.records.unshift([d.get('name'),d.get('cat'),d.get('provider')||'Personal record',new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})]);save();S.modal=null;render();toast('Clinical record added')};let mf=document.getElementById('medForm');if(mf)mf.onsubmit=e=>{e.preventDefault();let d=new FormData(mf);S.meds.unshift([d.get('name'),d.get('dose'),d.get('schedule'),'Not set']);save();S.modal=null;render();toast('Medication added')};let ch=document.getElementById('choose');if(ch)ch.onclick=()=>{let f=document.getElementById('file').files[0];if(!f)return toast('Choose a file first');S.records.unshift([f.name.replace(/\.[^.]+$/,''),'Imported document','Personal upload',new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})]);save();S.modal=null;render();toast('Document added locally')}}
render();
</script></body></html>
